<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>教师文档智能体</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <p class="eyebrow">Teacher_skill</p>
            <h1>教师文档智能体</h1>
          </div>
        </div>
        <a class="glass-button ghost-link" href="/download/sample-template">
          <span class="button-icon" aria-hidden="true">↓</span>
          <span>示例模板</span>
        </a>
      </header>

      <main class="workspace">
        <section class="glass-panel input-panel" aria-label="教案输入">
          <div class="panel-head">
            <p class="eyebrow">Lesson Studio</p>
            <h2>课程信息</h2>
          </div>

          <form id="lesson-form">
            <div class="field-grid">
              <label>
                <span>学科</span>
                <input name="subject" value="语文" autocomplete="off" />
              </label>
              <label>
                <span>年级</span>
                <input name="grade" value="四年级" autocomplete="off" />
              </label>
              <label>
                <span>课题</span>
                <input name="title" value="观潮" autocomplete="off" />
              </label>
              <label>
                <span>课时</span>
                <input name="class_hour" value="1课时" autocomplete="off" />
              </label>
            </div>

            <label class="wide-label file-drop">
              <span>Word 模板</span>
              <input id="template-input" name="template" type="file" accept=".docx" />
            </label>

            <label class="wide-label">
              <span>教材内容</span>
              <textarea name="material" id="material" rows="14"></textarea>
            </label>

            <div class="actions">
              <button type="button" class="glass-button secondary" id="sample-button">
                <span class="button-icon" aria-hidden="true">＋</span>
                <span>示例材料</span>
              </button>
              <button type="submit" class="glass-button primary" id="generate-button">
                <span class="button-icon" aria-hidden="true">✦</span>
                <span>生成内容</span>
              </button>
            </div>
          </form>
        </section>

        <section class="glass-panel output-panel" aria-label="生成结果">
          <div class="result-head">
            <div class="panel-head">
              <p class="eyebrow">Review</p>
              <h2 id="result-title">等待生成</h2>
            </div>
            <div class="result-actions">
              <button type="button" class="glass-button export-button" id="export-button" disabled>
                <span class="button-icon" aria-hidden="true">↗</span>
                <span>导出 Word</span>
              </button>
              <a id="download-link" class="glass-button download-link is-disabled" href="#" aria-disabled="true">
                <span class="button-icon" aria-hidden="true">↓</span>
                <span>下载 Word</span>
              </a>
            </div>
          </div>

          <div id="status" class="status" aria-live="polite">待生成</div>

          <div class="summary-grid" id="summary-grid">
            <div>
              <span>模板字段</span>
              <strong id="field-count">0</strong>
            </div>
            <div>
              <span>输出文件</span>
              <strong id="file-name">未导出</strong>
            </div>
          </div>

          <div class="preview-list" id="preview-list"></div>
        </section>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
