<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>教师文档智能体</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <p class="eyebrow">Teacher_skill V5</p>
            <h1>教师文档智能体</h1>
          </div>
        </div>
        <div class="topbar-meta" aria-label="当前架构">
          <span>Dify-inspired</span>
          <strong>可编排备课工作流</strong>
        </div>
      </header>

      <main class="workspace">
        <section class="glass-panel input-panel" aria-label="教案输入">
          <div class="panel-head">
            <p class="eyebrow">Lesson Studio</p>
            <h2>课程信息</h2>
          </div>

          <div class="workflow-map" aria-label="智能体框架图">
            <div class="workflow-map-head">
              <span>智能体框架</span>
              <strong id="workflow-version">V5</strong>
            </div>
            <div class="workflow-steps" id="workflow-steps"></div>
          </div>

          <form id="lesson-form">
            <div class="field-grid">
              <label>
                <span>学科</span>
                <input name="subject" placeholder="如：语文、数学、物理" autocomplete="off" required />
              </label>
              <label>
                <span>年级</span>
                <input name="grade" placeholder="如：四年级、八年级、高一" autocomplete="off" required />
              </label>
              <label>
                <span>课题</span>
                <input name="title" placeholder="请输入课题名称" autocomplete="off" required />
              </label>
              <label>
                <span>课时</span>
                <input name="class_hour" value="1课时" autocomplete="off" required />
              </label>
              <label>
                <span>课型</span>
                <select name="class_type">
                  <option value="新授课">新授课</option>
                  <option value="复习课">复习课</option>
                  <option value="探究/实验课">探究/实验课</option>
                  <option value="讲评课 / 习题课">讲评课 / 习题课</option>
                  <option value="活动课 / 拓展课">活动课 / 拓展课</option>
                </select>
              </label>
              <label>
                <span>教学法</span>
                <select name="teaching_style">
                  <option value="常规启发式">常规启发式</option>
                  <option value="BOPPPS参与式教学">BOPPPS 参与式</option>
                  <option value="5E探究模型">5E 探究模型</option>
                  <option value="项目驱动(PBL)">项目驱动 PBL</option>
                  <option value="游戏化教学">游戏化教学</option>
                </select>
              </label>
              <label>
                <span>学生层次</span>
                <select name="student_level">
                  <option value="常规混合水平">常规混合水平</option>
                  <option value="基础薄弱 / 补弱导向">基础薄弱 / 补弱导向</option>
                  <option value="学有余力 / 培优导向">学有余力 / 培优导向</option>
                </select>
              </label>
              <label>
                <span>生成深度</span>
                <select name="generation_depth">
                  <option value="标准">标准</option>
                  <option value="精简">精简</option>
                  <option value="深度">深度</option>
                </select>
              </label>
            </div>

            <label class="wide-label file-drop">
              <span>Word 模板</span>
              <input id="template-input" name="template" type="file" accept=".docx" required />
            </label>

            <label class="wide-label">
              <span>教材内容</span>
              <textarea name="material" id="material" rows="14" placeholder="粘贴教材内容、知识点、课程标准要求或课堂任务说明" required></textarea>
            </label>

            <div class="actions">
              <button type="submit" class="glass-button primary" id="generate-button">
                <span class="button-icon" aria-hidden="true">✦</span>
                <span>生成内容</span>
              </button>
            </div>
          </form>
        </section>

        <section class="glass-panel output-panel" aria-label="生成结果">
          <div class="result-head">
            <div class="panel-head">
              <p class="eyebrow">Review</p>
              <h2 id="result-title">等待生成</h2>
            </div>
            <div class="result-actions">
              <button type="button" class="glass-button export-button" id="export-button" disabled>
                <span class="button-icon" aria-hidden="true">↗</span>
                <span>生成 Word</span>
              </button>
              <a id="download-link" class="glass-button download-link is-disabled" href="#" aria-disabled="true">
                <span class="button-icon" aria-hidden="true">↓</span>
                <span>下载最新 Word</span>
              </a>
              <a id="preview-link" class="glass-button preview-link is-disabled" href="#" target="_blank" rel="noreferrer" aria-disabled="true">
                <span class="button-icon" aria-hidden="true">□</span>
                <span>查看 Word 预览</span>
              </a>
            </div>
          </div>

          <div id="status" class="status" aria-live="polite">待生成</div>

          <div class="summary-grid" id="summary-grid">
            <div>
              <span>已识别字段</span>
              <strong id="field-count">0</strong>
            </div>
            <div>
              <span>模板模式</span>
              <strong id="template-mode">待识别</strong>
            </div>
            <div class="summary-wide">
              <span>输出文件</span>
              <strong id="file-name">未导出</strong>
            </div>
          </div>

          <div class="template-map" id="template-map" hidden></div>

          <section class="review-panel" id="review-panel" hidden>
            <div class="mini-head">
              <span>教研审阅</span>
              <strong id="review-score">0</strong>
            </div>
            <p id="review-summary"></p>
            <div class="review-columns">
              <div>
                <span>发现问题</span>
                <ul id="review-issues"></ul>
              </div>
              <div>
                <span>优化建议</span>
                <ul id="review-improvements"></ul>
              </div>
            </div>
          </section>

          <section class="history-panel">
            <div class="mini-head">
              <span>历史记录</span>
              <strong>最近导出</strong>
            </div>
            <div class="history-list" id="history-list"></div>
          </section>

          <div class="preview-list" id="preview-list"></div>
        </section>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
