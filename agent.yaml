name: Teacher_skill
display_name: 教案助手 Teacher Skill
version: 0.1.0
description: 使用 AgentSkills 风格组织教师工作技能，支持教案生成、Word 模板填充、文档润色和练习题生成。
runtime_style: agentskills-runtime
entrypoints:
  cli: python -m teacher_agent.cli
skills:
  - skills/lesson-plan-writer
  - skills/document-template-filler
  - skills/document-editor
  - skills/worksheet-generator
principles:
  - 模板决定格式
  - AI 只生成内容
  - 程序按模板字段填充
  - 保留学校原始 Word 模板格式
default_workflow:
  - scan-template
  - draft-lesson
  - fill-template
